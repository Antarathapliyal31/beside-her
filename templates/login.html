<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Beside Her – Sign In</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

<nav>
  <a href="/" class="logo">Beside <span>Her</span></a>
</nav>

<div class="page">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-icon">🤍</div>
      <h2>Welcome back</h2>
      <p class="auth-sub">Sign in to continue supporting her</p>
    </div>

    <form id="login-form">

      <div class="form-group">
        <label>Email</label>
        <input type="email" 
               id="email" 
               placeholder="your@email.com" 
               required/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" 
               id="password" 
               placeholder="your password" 
               required/>
      </div>

      <button type="submit" class="submit-btn">
        Sign In →
      </button>

    </form>

    <p class="auth-switch">
      Don't have an account? 
      <a href="/signup">Sign up here</a>
    </p>

    <div id="auth-error" class="auth-error hidden"></div>

  </div>
</div>

<script>
  document.getElementById('login-form')
    .addEventListener('submit', async e => {
      e.preventDefault();

      const btn = document.querySelector('.submit-btn');
      btn.textContent = 'Signing in...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });

        const data = await res.json();

        if (data.error) {
          document.getElementById('auth-error').textContent = data.error;
          document.getElementById('auth-error').classList.remove('hidden');
          btn.textContent = 'Sign In →';
          btn.disabled = false;
          return;
        }

        window.location.href = data.redirect;

      } catch (err) {
        document.getElementById('auth-error').textContent = 
          'Something went wrong. Please try again.';
        document.getElementById('auth-error').classList.remove('hidden');
        btn.textContent = 'Sign In →';
        btn.disabled = false;
      }
  });
</script>

</body>
</html>
